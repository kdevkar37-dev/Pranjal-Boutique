server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  shutdown: graceful

spring:
  application:
    name: boutique-backend
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/pranjal_boutique}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:replace-me}
            client-secret: ${GOOGLE_CLIENT_SECRET:replace-me}
            scope:
              - profile
              - email

app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-long-base64-secret-key}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3002}
  oauth2:
    redirect-url: ${OAUTH2_REDIRECT_URL:http://localhost:3000/oauth2/success}
  admin:
    email: ${ADMIN_EMAIL:admin@pranjalboutique.com}
    password: ${ADMIN_PASSWORD:Admin@123}
    name: ${ADMIN_NAME:Pranjal Admin}

logging:
  level:
    root: INFO
    com.pranjal.boutique: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
