server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  shutdown: graceful

spring:
  application:
    name: boutique-backend
  data:
    mongodb:
      uri: ${MONGODB_URI}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - profile
              - email

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 604800000
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:2592000000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  security:
    refresh-cookie-name: ${REFRESH_COOKIE_NAME:boutique_refresh}
    refresh-cookie-secure: ${REFRESH_COOKIE_SECURE:true}
    refresh-cookie-same-site: ${REFRESH_COOKIE_SAME_SITE:Strict}
    require-https: ${REQUIRE_HTTPS:true}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    auth-max-per-minute: ${RATE_LIMIT_AUTH_PER_MINUTE:15}
    write-max-per-minute: ${RATE_LIMIT_WRITE_PER_MINUTE:50}
    default-max-per-minute: ${RATE_LIMIT_DEFAULT_PER_MINUTE:150}
  pagination:
    admin-max-items: ${ADMIN_MAX_ITEMS:500}
  oauth2:
    redirect-url: ${OAUTH2_REDIRECT_URL}
  admin:
    email: ${ADMIN_EMAIL}
    password: ${ADMIN_PASSWORD}
    name: ${ADMIN_NAME:Pranjal Admin}
  upload:
    dir: ${UPLOAD_DIR:uploads/images}
    max-size: ${UPLOAD_MAX_SIZE:5242880}
    file-upload-enabled: ${FILE_UPLOAD_ENABLED:true}
    provider: ${UPLOAD_PROVIDER:cloudinary}
    cloudinary:
      cloud-name: ${CLOUDINARY_CLOUD_NAME}
      api-key: ${CLOUDINARY_API_KEY}
      api-secret: ${CLOUDINARY_API_SECRET}
      folder: ${CLOUDINARY_FOLDER:boutique-services}

  alerts:
    enabled: ${ALERTS_ENABLED:false}
    webhook-url: ${ALERTS_WEBHOOK_URL:}
    webhook-token: ${ALERTS_WEBHOOK_TOKEN:}

logging:
  level:
    root: INFO
    com.pranjal.boutique: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
