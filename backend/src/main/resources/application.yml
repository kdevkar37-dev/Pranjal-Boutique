server:
  port: 8080

spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/pranjal_boutique
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:replace-me}
            client-secret: ${GOOGLE_CLIENT_SECRET:replace-me}
            scope:
              - profile
              - email

app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-long-base64-secret-key}
    expiration-ms: 86400000
  cors:
    allowed-origins: http://localhost:3000
  oauth2:
    redirect-url: http://localhost:3000/oauth2/success
  admin:
    email: ${ADMIN_EMAIL:admin@pranjalboutique.com}
    password: ${ADMIN_PASSWORD:Admin@123}
    name: ${ADMIN_NAME:Pranjal Admin}
