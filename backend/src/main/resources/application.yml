server:
  port: 8080

spring:
  data:
    mongodb:
      uri: mongodb+srv://kuldeepdevkar24_db_user:<db_password>@pranjalboutique.sd7ruvm.mongodb.net/?appName=Pranjalboutique
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:replace-me}
            client-secret: ${GOOGLE_CLIENT_SECRET:replace-me}
            scope:
              - profile
              - email
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-long-base64-secret-key}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://*.vercel.app,http://localhost:3000,http://localhost:5173}
  oauth2:
    redirect-url: http://localhost:3000/oauth2/success
  admin:
    email: ${ADMIN_EMAIL:admin@pranjalboutique.com}
    password: ${ADMIN_PASSWORD:Admin@123}
    name: ${ADMIN_NAME:Pranjal Admin}
  upload:
    dir: ${UPLOAD_DIR:uploads/images}
    max-size: ${UPLOAD_MAX_SIZE:5242880}
    file-upload-enabled: ${FILE_UPLOAD_ENABLED:true}
    provider: ${UPLOAD_PROVIDER:local}
    cloudinary:
      cloud-name: ${CLOUDINARY_CLOUD_NAME:}
      api-key: ${CLOUDINARY_API_KEY:}
      api-secret: ${CLOUDINARY_API_SECRET:}
      folder: ${CLOUDINARY_FOLDER:boutique-services}
