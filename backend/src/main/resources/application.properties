spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/pranjalboutique}
spring.data.mongodb.database=${MONGODB_DATABASE:pranjalboutique}
app.jwt.secret=ReplaceWithAtLeast32ByteSecretKeyForLocalDev123!
app.jwt.expiration-ms=604800000
app.jwt.refresh-expiration-ms=2592000000

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://*.vercel.app,http://localhost:3000,http://localhost:5173}
app.security.refresh-cookie-name=boutique_refresh
app.security.refresh-cookie-secure=false
app.security.refresh-cookie-same-site=Lax
app.security.require-https=false

app.rate-limit.enabled=true
app.rate-limit.auth-max-per-minute=20
app.rate-limit.write-max-per-minute=60
app.rate-limit.default-max-per-minute=180
app.pagination.admin-max-items=500

# Image Upload Configuration
app.upload.dir=${UPLOAD_DIR:uploads/images}
app.upload.max-size=${UPLOAD_MAX_SIZE:5242880}
app.upload.file-upload-enabled=${FILE_UPLOAD_ENABLED:true}
app.upload.provider=${UPLOAD_PROVIDER:local}
app.upload.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
app.upload.cloudinary.api-key=${CLOUDINARY_API_KEY:}
app.upload.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
app.upload.cloudinary.folder=${CLOUDINARY_FOLDER:boutique-services}

# Ops Alerts (optional webhook for failures/security events)
app.alerts.enabled=false
app.alerts.webhook-url=
app.alerts.webhook-token=

# Server Configuration
server.servlet.context-path=/
server.port=8080
