services:
  - type: web
    name: pranjal-boutique-backend
    runtime: docker
    dockerfilePath: ./Dockerfile.render
    dockerContext: .
    branch: avishkar
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: Pranjal Admin
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: OAUTH2_REDIRECT_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: boutique-services
      - key: UPLOAD_PROVIDER
        value: cloudinary
      - key: FILE_UPLOAD_ENABLED
        value: "true"
      - key: REQUIRE_HTTPS
        value: "false"
      - key: REFRESH_COOKIE_SECURE
        value: "true"
      - key: REFRESH_COOKIE_SAME_SITE
        value: None
